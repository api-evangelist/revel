aid: revel
name: Revel Systems
description: >-
  Revel Systems is an iPad-based point-of-sale platform for restaurants and
  retail businesses. Its REST API provides programmatic access to menus,
  orders, inventory, loyalty programs, customer data, employee scheduling,
  cash management, and business analytics. The API supports approximately 140
  public endpoints and returns responses in JSON. Authentication uses either
  API key/secret headers or Bearer tokens via OAuth 2.0 client credentials.
  Revel is now part of Shift4 Payments.
