    name: Revel Systems API
    description: >-
      REST API for the Revel Systems iPad POS platform, covering orders,
      payments, products, inventory, customers, employees, scheduling, cash
      management, discounts, tax, tables, purchase orders, house accounts,
      and web orders. Approximately 140 public endpoints return JSON responses
      and support GET, POST, PUT, PATCH, and DELETE methods.
